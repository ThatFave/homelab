apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tandoor
  namespace: tandoor
spec:
  interval: 5m
  chart:
    spec:
      chart: tandoor
      version: "1.5.31"
      sourceRef:
        kind: HelmRepository
        name: tandoor
        namespace: flux-system
  values:
    env:
      TIMEZONE: Europe/Berlin

    persistence:
      config:
        enabled: true
        retain: true
      media:
        enabled: true
        mountPath: /opt/recipes/mediafiles
        retain: true
