apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lldap
  namespace: lldap
spec:
  interval: 5m
  chart:
    spec:
      chart: lldap
      version: "0.5.3"
      sourceRef:
        kind: HelmRepository
        name: lladp
        namespace: flux-system
  values:
    lldap:
      baseDN: "dc=mhesemann,dc=de"
      secretName: "lldap"
      jwtSecretKey: jwtSecret
      ldapUserPassKey: ldapUserPass
      keySeedKey: keySeed
      tz: "Europe/Berlin"
    persistence:
      enabled: true
