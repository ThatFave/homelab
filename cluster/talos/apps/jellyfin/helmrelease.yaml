apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 5m
  chart:
    spec:
      chart: jellyfin
      version: ">=3.2.7"
      sourceRef:
        kind: HelmRepository
        name: djjudas21
        namespace: flux-system
  values:
    jellyfin:
      mediaVolumes:
        - name: media-library
          readOnly: false
          existingClaim: media-library-pvc
