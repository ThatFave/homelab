# clusters/my-cluster/apps/podinfo/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: default # Target namespace for podinfo deployment
spec:
  interval: 5m
  chart:
    spec:
      chart: podinfo
      version: ">=6.0.0" # Specify a version or range
      sourceRef:
        kind: HelmRepository
        name: podinfo # Matches the HelmRepository metadata.name above
        namespace: flux-system # Namespace of the HelmRepository
  values:
    replicaCount: 2
    ui:
      message: "Hello from Flux on Talos!"
    service:
      type: ClusterIP # Or LoadBalancer if your environment supports it