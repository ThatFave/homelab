apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 5m
  chart:
    spec:
      chart: vaultwarden
      version: "1.34.1"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: flux-system
  values:
    domain: "https://vaultwarden.wild-fahrenheit.ts.net"
    signupsVerify: "false"
    data:
      name: "vaultwarden-data"
      size: "15Gi"
    attachments:
      name: "vaultwarden-data"
      size: "15Gi"
