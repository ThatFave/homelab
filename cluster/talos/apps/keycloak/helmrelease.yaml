apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: keycloak
    namespace: flux-system
  values:
    adminRealm: "main"
    production: false
    proxyHeaders: "xforwarded"

    auth:
      adminUser: admin
      existingSecret: secrets
      passwordSecretKey: admin_password

    tls:
      passwordsSecret: secrets

    spi:
      passwordsSecret: secrets

    postgresql:
      auth:
        existingSecret: secrets
        secretKeys:
          userPasswordKey: postgres-user-password
