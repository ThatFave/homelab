apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: keycloak
      version: ">=26.2.4"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    enableServiceLinks: true
    clusterDomain: cluster.local
    usePasswordFiles: true
    adminRealm: "main"
    production: false
    proxyHeaders: "xforwarded"
    httpRelativePath: "/"
    enableDefaultInitContainers: true
    replicaCount: 1
    revisionHistoryLimitCount: 10
    mountServiceAccountToken: true
    podAntiAffinityPreset: soft
    podManagementPolicy: Parallel
    minReadySeconds: 0
    updateStrategy:
      type: RollingUpdate

    auth:
      adminUser: admin
      existingSecret: secrets
      passwordSecretKey: admin_password

    tls:
      enabled: false
      autoGenerated: false
      existingSecret: ""
      usePem: false
      truststoreFilename: "keycloak.truststore.jks"
      keystoreFilename: "keycloak.keystore.jks"
      passwordsSecret: secrets

    spi:
      truststoreFilename: "keycloak-spi.truststore.jks"
      passwordsSecret: secrets

    service:
      type: ClusterIP
      http:
        enabled: true
      ports:
        http: 80
        https: 443
      sessionAffinity: None
      externalTrafficPolicy: Cluster

    networkPolicy:
      enabled: true
      allowExternal: true
      allowExternalEgress: true
      kubeAPIServerPorts: [443, 6443, 8443]

    serviceAccount:
      create: true

    rbac:
      create: false

    pdb:
      create: true

    autoscaling:
      enabled: false

    metrics:
      enabled: false

    keycloakConfigCli:
      enabled: false

    postgresql:
      enabled: true
      auth:
        username: bn_keycloak
        database: bitnami_keycloak
        existingSecret: secrets
        secretKeys:
          userPasswordKey: postgres-user-password
      architecture: standalone

    cache:
      enabled: false
