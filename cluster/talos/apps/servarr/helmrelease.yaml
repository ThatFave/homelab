apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: servarr
  namespace: servarr
spec:
  interval: 5m
  chart:
    spec:
      chart: servarr
      version: "1.1.7"
      sourceRef:
        kind: HelmRepository
        name: servarr
        namespace: flux-system
  values:
    jellyfin:
      persistence:
        media:
          existingClaim: "servarr-jellyfin-media"
          accessMode: ReadWriteMany
          size: 300Gi
    sonarr:
      env:
        TZ: "Europe/Berlin"
    qbittorrent:
      env:
        TZ: "Europe/Berlin"
    prowlarr:
      env:
        TZ: "Europe/Berlin"
    bazarr:
      env:
        TZ: "Europe/Berlin"
    radarr:
      env:
        TZ: "Europe/Berlin"
    lidarr:
      enabled: false
    readarr:
      enabled: false
    cleanuperr:
      enabled: true
      secrets:
        existingSecret: "servarr"
      env:
        TZ: "Europe/Berlin"
