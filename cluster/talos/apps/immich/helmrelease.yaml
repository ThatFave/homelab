apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: helm-common
    namespace: flux-system
  values:
    containers:
      - name: immich-server
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: release
        env:
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich
                key: db-password
        volumeMounts:
          - name: media
            mountPath: /usr/src/app/upload

      - name: immich-machine-learning
        image:
          repository: ghcr.io/immich-app/immich-machine-learning
          tag: release
        env:
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich
                key: db-password
          - name: DB_USERNAME
            value: postgres
          - name: DB_DATABASE_NAME
            value: postgres
        volumeMounts:
          - name: model-cache
            mountPath: /cache

      - name: vectorchord
        image:
          repository: tensorchord/vchord-postgres
          tag: pg17-v0.4.2
        env:
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich
                key: db-password
        volumeMounts:
          - name: vectorchord-data
            mountPath: /var/lib/postgresql/data

      - name: redis
        image:
          repository: docker.io/valkey/valkey
          tag: 8-bookworm

    service:
      type: ClusterIP
      port: 2283
