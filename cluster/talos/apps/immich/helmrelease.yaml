apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: immich
    namespace: flux-system
  values:
    image:
      tag: v1.134.0

    immich:
      persistence:
        library:
          existingClaim: immich-library

    postgresql:
      enabled: true
      image:
        tag: pg14-v0.3.0
      global:
        postgresql:
          auth:
            existingSecret:
              enabled: true
              secretName: immich
              secretKey: password

    redis:
      enabled: true

    machine-learning:
      persistence:
        cache:
          type: pvc
          accessMode: ReadWriteOnce
