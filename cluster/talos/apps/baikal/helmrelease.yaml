apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: baikal
  namespace: baikal
spec:
  interval: 5m
  chart:
    spec:
      chart: baikal
      version: ">=6.0.0"
      sourceRef:
        kind: HelmRepository
        name: baikal
        namespace: baikal
  values:
    replicaCount: 2
    ui:
      message: "Hello from Flux on Talos!"
    service:
      type: ClusterIP
