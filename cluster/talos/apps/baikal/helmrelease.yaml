apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: baikal
  namespace: baikal
spec:
  interval: 5m
  chart:
    spec:
      chart: baikal
      version: ">=5.2.0"
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  values:
    image:
      tag: latest
    env:
      TZ: Europe/Berlin
    persistence:
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 1Gi
      data:
        enabled: true
        accessMode: ReadWriteOnce
        size: 1Gi
