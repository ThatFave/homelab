apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets
  namespace: flux-system
spec:
  dependsOn:
  - name: flux-system
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./cluster/talos
  prune: true
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
