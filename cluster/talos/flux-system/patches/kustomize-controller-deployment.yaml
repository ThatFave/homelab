apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo-test
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./cluster/talos/apps/podinfo/
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
