apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo
  namespace: flux-system
spec:
  dependsOn:
  - name: flux-system
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: homelab
  path: ./cluster/talos/podinfo
  prune: true
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
